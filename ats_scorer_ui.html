<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATS Resume Scorer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f8;
    --muted: #8888aa;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --amber: #fbbf24;
    --glow: rgba(108,99,255,0.15);
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 400px; height: 400px; background: rgba(108,99,255,0.12); top: -100px; right: -100px; }
  .orb2 { width: 300px; height: 300px; background: rgba(52,211,153,0.08); bottom: -50px; left: -50px; }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 3rem 2rem;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(108,99,255,0.12);
    border: 1px solid rgba(108,99,255,0.3);
    border-radius: 100px;
    padding: 4px 14px;
    font-size: 12px;
    color: var(--accent2);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
    margin-bottom: 1.5rem;
  }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 1rem;
    background: linear-gradient(135deg, #f0f0f8 0%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 1rem;
    color: var(--muted);
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .upload-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }

  @media (max-width: 640px) { .upload-grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    transition: border-color 0.2s;
  }

  .panel:hover { border-color: var(--border2); }

  .panel-label {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-label::before {
    content: '';
    width: 3px; height: 12px;
    border-radius: 2px;
    background: var(--accent);
  }

  .drop-zone {
    border: 1px dashed rgba(108,99,255,0.3);
    border-radius: 12px;
    padding: 2rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(108,99,255,0.03);
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(108,99,255,0.08);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    width: 40px; height: 40px;
    margin: 0 auto 12px;
    background: rgba(108,99,255,0.15);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .drop-text { font-size: 14px; color: var(--muted); }
  .drop-text strong { color: var(--accent2); font-weight: 500; }

  .file-name {
    margin-top: 10px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--green);
    display: none;
  }

  textarea {
    width: 100%;
    background: rgba(108,99,255,0.03);
    border: 1px dashed rgba(108,99,255,0.3);
    border-radius: 12px;
    padding: 1rem;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    line-height: 1.6;
    resize: none;
    height: 160px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea::placeholder { color: rgba(136,136,170,0.5); }
  textarea:focus { border-color: var(--accent); background: rgba(108,99,255,0.06); }

  .api-row {
    display: flex;
    gap: 12px;
    margin-bottom: 1.5rem;
    align-items: center;
  }

  .api-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: all 0.2s;
  }

  .api-input:focus { border-color: var(--accent); color: var(--text); }

  .api-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }

  .btn-analyse {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    letter-spacing: -0.01em;
  }

  .btn-analyse::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn-analyse:hover::before { opacity: 1; }
  .btn-analyse:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(108,99,255,0.4); }
  .btn-analyse:active { transform: translateY(0); }
  .btn-analyse:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .results { margin-top: 2rem; display: none; }
  .results.visible { display: block; }

  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .score-card::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .score-number {
    font-size: 5rem;
    font-weight: 700;
    letter-spacing: -0.05em;
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .score-rating {
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    padding: 4px 16px;
    border-radius: 100px;
    display: inline-block;
    margin-bottom: 1.5rem;
  }

  .score-bar-wrap {
    background: rgba(255,255,255,0.05);
    border-radius: 100px;
    height: 6px;
    overflow: hidden;
    max-width: 400px;
    margin: 0 auto;
  }

  .score-bar {
    height: 100%;
    border-radius: 100px;
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  .kw-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  @media (max-width: 580px) { .kw-grid { grid-template-columns: 1fr; } }

  .kw-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
  }

  .kw-title {
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .kw-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .kw-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    padding: 3px 10px;
    border-radius: 6px;
    border: 1px solid;
  }

  .tag-green {
    background: rgba(52,211,153,0.08);
    border-color: rgba(52,211,153,0.2);
    color: var(--green);
  }

  .tag-red {
    background: rgba(248,113,113,0.08);
    border-color: rgba(248,113,113,0.2);
    color: var(--red);
  }

  .error-msg {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--red);
    margin-top: 1rem;
    display: none;
    font-family: 'JetBrains Mono', monospace;
  }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .excellent { color: var(--green); }
  .good { color: var(--accent2); }
  .partial { color: var(--amber); }
  .low { color: var(--red); }

  .bar-excellent { background: var(--green); }
  .bar-good { background: var(--accent2); }
  .bar-partial { background: var(--amber); }
  .bar-low { background: var(--red); }

  .rating-excellent { background: rgba(52,211,153,0.1); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
  .rating-good { background: rgba(167,139,250,0.1); color: var(--accent2); border: 1px solid rgba(167,139,250,0.2); }
  .rating-partial { background: rgba(251,191,36,0.1); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
  .rating-low { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
  <header>
    <div class="badge">semantic · vector · matching</div>
    <h1>ATS Resume Scorer</h1>
    <p class="subtitle">Semantic resume-JD matching using sentence transformers — understands meaning, not just keywords.</p>
  </header>

  <div class="api-row">
    <span class="api-label">API →</span>
    <input class="api-input" id="apiUrl" type="text" value="http://127.0.0.1:8000" placeholder="https://your-app.onrender.com" />
  </div>

  <div class="upload-grid">
    <div class="panel">
      <div class="panel-label">Resume PDF</div>
      <div class="drop-zone" id="dropZone">
        <input type="file" id="resumeFile" accept=".pdf" />
        <div class="drop-icon">📄</div>
        <div class="drop-text"><strong>Click to upload</strong> or drag & drop</div>
        <div class="drop-text" style="font-size:11px; margin-top:4px;">PDF only</div>
        <div class="file-name" id="fileName"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-label">Job Description</div>
      <textarea id="jdText" placeholder="Paste the full job description here...&#10;&#10;We're looking for a Machine Learning Engineer with experience in Python, TensorFlow, Docker..."></textarea>
    </div>
  </div>

  <button class="btn-analyse" id="analyseBtn" onclick="analyse()">
    Analyse Match
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="results" id="results">
    <div class="score-card">
      <div class="score-number" id="scoreNum">--</div>
      <div class="score-rating" id="scoreRating">--</div>
      <div class="score-bar-wrap">
        <div class="score-bar" id="scoreBar"></div>
      </div>
    </div>

    <div class="kw-grid">
      <div class="kw-panel">
        <div class="kw-title">
          <div class="kw-dot" style="background: var(--green)"></div>
          Matched keywords
        </div>
        <div class="kw-tags" id="matchedTags"></div>
      </div>
      <div class="kw-panel">
        <div class="kw-title">
          <div class="kw-dot" style="background: var(--red)"></div>
          Missing keywords
        </div>
        <div class="kw-tags" id="missingTags"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const fileInput = document.getElementById('resumeFile');
  const fileName = document.getElementById('fileName');
  const dropZone = document.getElementById('dropZone');

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) {
      fileName.textContent = fileInput.files[0].name;
      fileName.style.display = 'block';
    }
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') {
      const dt = new DataTransfer();
      dt.items.add(file);
      fileInput.files = dt.files;
      fileName.textContent = file.name;
      fileName.style.display = 'block';
    }
  });

  async function analyse() {
    const btn = document.getElementById('analyseBtn');
    const errDiv = document.getElementById('errorMsg');
    const results = document.getElementById('results');
    errDiv.style.display = 'none';
    results.classList.remove('visible');

    const file = fileInput.files[0];
    const jd = document.getElementById('jdText').value.trim();
    const apiBase = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');

    if (!file) return showError('Please upload a PDF resume.');
    if (!jd) return showError('Please paste a job description.');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Analysing...';

    const formData = new FormData();
    formData.append('resume_file', file);
    formData.append('job_description', jd);

    try {
      const res = await fetch(`${apiBase}/score`, { method: 'POST', body: formData });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'API error');
      }
      const data = await res.json();
      renderResults(data);
    } catch (e) {
      if (e.message.includes('fetch') || e.message.includes('Failed')) {
        showError(`Cannot reach API at ${apiBase}. Make sure FastAPI is running.`);
      } else {
        showError(e.message);
      }
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Analyse Match';
    }
  }

  function renderResults(data) {
    const score = data.similarity_score;
    const scoreNum = document.getElementById('scoreNum');
    const scoreRating = document.getElementById('scoreRating');
    const scoreBar = document.getElementById('scoreBar');

    let cls = score >= 75 ? 'excellent' : score >= 55 ? 'good' : score >= 35 ? 'partial' : 'low';
    let barCls = 'bar-' + cls;
    let ratingCls = 'rating-' + cls;

    scoreNum.className = 'score-number ' + cls;
    scoreNum.textContent = score.toFixed(1) + '%';
    scoreRating.className = 'score-rating ' + ratingCls;
    scoreRating.textContent = data.rating;
    scoreBar.className = 'score-bar ' + barCls;
    setTimeout(() => { scoreBar.style.width = Math.min(score, 100) + '%'; }, 100);

    renderTags('matchedTags', data.matched_keywords, 'tag-green');
    renderTags('missingTags', data.missing_keywords.slice(0, 20), 'tag-red');

    document.getElementById('results').classList.add('visible');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderTags(id, words, cls) {
    const el = document.getElementById(id);
    el.innerHTML = words.length
      ? words.map(w => `<span class="tag ${cls}">${w}</span>`).join('')
      : `<span style="font-size:12px; color: var(--muted); font-family: 'JetBrains Mono', monospace;">none found</span>`;
  }

  function showError(msg) {
    const e = document.getElementById('errorMsg');
    e.textContent = '! ' + msg;
    e.style.display = 'block';
  }
</script>
</body>
</html>
